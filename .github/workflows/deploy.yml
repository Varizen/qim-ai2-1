name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend
      - name: Validate backend entrypoint
        run: node --check server.js
        working-directory: backend

  deploy-backend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      # Add deploy steps for Render/Railway here
      # Or use Render Deploy Hook:
      # - run: curl "$RENDER_DEPLOY_HOOK_URL"
